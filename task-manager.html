<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #D22B2B;
            --red-light: #F5E0E0;
            --blue-light: #E8F0FA;
            --blue-accent: #4A90D9;
            --gray-bg: #F4F4F6;
            --gray-card: #F0F0F3;
            --text-dark: #1A1A1A;
            --text-mid: #555;
            --text-light: #AAA;
            --white: #FFFFFF;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--gray-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .phone {
            width: 390px;
            min-height: 100vh;
            background: var(--white);
            padding: 52px 24px 40px;
            position: relative;
            overflow: hidden;
        }

        /* ─── SECTION TITLES ─── */
        .section-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        /* ─── TIMER CIRCLE ─── */
        .timer-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .timer-ring {
            position: relative;
            width: 160px;
            height: 160px;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
        }

        .timer-ring .track {
            stroke: var(--red-light);
        }

        .timer-ring .progress {
            stroke: var(--red);
            stroke-dasharray: 440;
            stroke-dashoffset: 110;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .timer-inner {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .timer-inner .minutes {
            font-size: 38px;
            font-weight: 900;
            color: var(--text-dark);
            line-height: 1;
        }

        .timer-inner .label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
            margin-top: 4px;
        }

        /* ─── URGENT TASK CARD ─── */
        .urgent-card {
            background: var(--red);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            margin-bottom: 32px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 6px 20px rgba(210, 43, 43, 0.35);
            position: relative;
        }

        .urgent-card:active {
            transform: scale(0.98);
        }

        .urgent-card .check-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2.5px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .urgent-card .check-btn.done {
            background: var(--white);
            border-color: var(--white);
        }

        .urgent-card .check-btn.done::after {
            content: '✓';
            color: var(--red);
            font-size: 14px;
            font-weight: 900;
        }

        .urgent-card .emoji {
            width: 46px;
            height: 46px;
            background: var(--white);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }

        .urgent-card .info {
            flex: 1;
            min-width: 0;
        }

        .badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 4px;
        }

        .badge.highest {
            background: var(--white);
            color: var(--red);
        }

        .badge.high {
            background: var(--red-light);
            color: var(--red);
        }

        .badge.medium {
            background: var(--blue-light);
            color: var(--blue-accent);
        }

        .urgent-card .task-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .urgent-card .task-time {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 2px;
        }

        .urgent-card .arrow {
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            flex-shrink: 0;
        }

        /* ─── CALENDAR ─── */
        .calendar-wrap {
            margin-bottom: 36px;
        }

        .cal-header {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .cal-month {
            background: var(--red);
            color: var(--white);
            font-size: 13px;
            font-weight: 800;
            padding: 4px 16px;
            border-radius: 20px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 2px 0;
        }

        .cal-day-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-light);
            padding-bottom: 8px;
        }

        .cal-day-label.weekend {
            color: var(--blue-accent);
        }

        .cal-date {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-mid);
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.15s;
        }

        .cal-date:empty {
            cursor: default;
        }

        .cal-date:hover:not(:empty) {
            background: var(--gray-bg);
        }

        .cal-date.today {
            background: var(--red);
            color: var(--white);
            font-weight: 900;
        }

        .cal-date.weekend {
            color: var(--blue-accent);
        }

        .cal-date.other {
            color: var(--text-light);
        }

        /* ─── UPCOMING SECTION ─── */
        .upcoming-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 36px;
        }

        .task-card {
            background: var(--gray-card);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative;
        }

        .task-card:active {
            transform: scale(0.98);
        }

        .task-card .check-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2.5px solid #CCC;
            background: var(--white);
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-card .check-btn.done {
            background: var(--red);
            border-color: var(--red);
        }

        .task-card .check-btn.done::after {
            content: '✓';
            color: var(--white);
            font-size: 13px;
            font-weight: 900;
        }

        .task-card .emoji {
            width: 44px;
            height: 44px;
            background: var(--white);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .task-card .info {
            flex: 1;
            min-width: 0;
        }

        .task-card .task-name {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: text-decoration 0.2s;
        }

        .task-card.done-card .task-name {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .task-card .task-time {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-mid);
            margin-top: 2px;
        }

        .task-card .arrow {
            color: var(--text-light);
            font-size: 18px;
            flex-shrink: 0;
        }

        /* ─── ADD BUTTON ─── */
        .add-btn-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .add-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--blue-light);
            border: none;
            cursor: pointer;
            font-size: 36px;
            color: var(--blue-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 14px rgba(74, 144, 217, 0.2);
        }

        .add-btn:hover {
            background: #d0e4f7;
            transform: scale(1.07);
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        /* ─── DETAIL MODAL ─── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-sheet {
            width: 390px;
            background: var(--white);
            border-radius: 28px 28px 0 0;
            padding: 24px 24px 48px;
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: #DDD;
            border-radius: 4px;
            margin: 0 auto 20px;
        }

        .modal-badge-row {
            margin-bottom: 10px;
        }

        .modal-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .modal-time {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-mid);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-emoji-big {
            font-size: 56px;
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-desc {
            font-size: 14px;
            color: var(--text-mid);
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .modal-close {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            background: var(--red);
            border: none;
            color: var(--white);
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .modal-close:hover {
            opacity: 0.9;
        }

        /* ─── ADD TASK MODAL ─── */
        .add-modal-sheet {
            width: 390px;
            background: var(--white);
            border-radius: 28px 28px 0 0;
            padding: 24px 24px 48px;
            animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .add-modal-title {
            font-size: 22px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .field-group {
            margin-bottom: 16px;
        }

        .field-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-mid);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--gray-card);
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
        }

        .field-input:focus {
            border-color: var(--red);
        }

        .priority-row {
            display: flex;
            gap: 10px;
        }

        .priority-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--gray-card);
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s;
            background: var(--white);
            color: var(--text-mid);
        }

        .priority-btn.sel-highest {
            background: var(--red-light);
            border-color: var(--red);
            color: var(--red);
        }

        .priority-btn.sel-high {
            background: var(--red-light);
            border-color: var(--red);
            color: var(--red);
        }

        .priority-btn.sel-medium {
            background: var(--blue-light);
            border-color: var(--blue-accent);
            color: var(--blue-accent);
        }

        .add-submit {
            width: 100%;
            margin-top: 6px;
            padding: 14px;
            border-radius: var(--radius-md);
            background: var(--red);
            border: none;
            color: var(--white);
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .add-submit:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="phone">

        <!-- ─── URGENT ─── -->
        <h2 class="section-title">Urgent</h2>

        <div class="timer-wrap">
            <div class="timer-ring">
                <svg width="160" height="160" viewBox="0 0 160 160">
                    <circle class="track" cx="80" cy="80" r="70" fill="none" stroke-width="10" />
                    <circle class="progress" id="timerProgress" cx="80" cy="80" r="70" fill="none" stroke-width="10" />
                </svg>
                <div class="timer-inner">
                    <span class="minutes" id="timerDisplay">120</span>
                    <span class="label">minutes remaining</span>
                </div>
            </div>
        </div>

        <!-- Urgent task card -->
        <div class="urgent-card" id="urgentCard">
            <button class="check-btn" onclick="toggleDone(event,'urgentCard')"></button>
            <div class="emoji">🧶</div>
            <div class="info">
                <span class="badge highest">highest</span>
                <div class="task-name">Final Prototype</div>
                <div class="task-time">⏱ 90 mins work</div>
            </div>
            <span class="arrow"
                onclick="openDetail(event,'Final Prototype','highest',90,'🧶','Polish and finalize the prototype for the client review. Ensure all interactions are smooth and edge cases are handled before the deadline.')">›</span>
        </div>

        <!-- ─── CALENDAR ─── -->
        <div class="calendar-wrap">
            <div class="cal-header"><span class="cal-month">April</span></div>
            <div class="cal-grid" id="calGrid"></div>
        </div>

        <!-- ─── UPCOMING ─── -->
        <h2 class="section-title">Up coming</h2>
        <div class="upcoming-list" id="upcomingList"></div>

        <!-- ─── ADD BUTTON ─── -->
        <div class="add-btn-wrap">
            <button class="add-btn" onclick="openAddModal()">+</button>
        </div>
    </div>

    <!-- ─── DETAIL MODAL ─── -->
    <div class="modal-overlay" id="detailModal" onclick="closeDetail(event)">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-emoji-big" id="modalEmoji"></div>
            <div class="modal-badge-row"><span class="badge" id="modalBadge"></span></div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-time" id="modalTime"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <button class="modal-close"
                onclick="document.getElementById('detailModal').classList.remove('open')">Close</button>
        </div>
    </div>

    <!-- ─── ADD TASK MODAL ─── -->
    <div class="modal-overlay" id="addModal" onclick="closeAddModal(event)">
        <div class="add-modal-sheet">
            <div class="modal-handle"></div>
            <div class="add-modal-title">New Task</div>
            <div class="field-group">
                <div class="field-label">Task Name</div>
                <input class="field-input" id="newTaskName" placeholder="Enter task name…" type="text" />
            </div>
            <div class="field-group">
                <div class="field-label">Duration (mins)</div>
                <input class="field-input" id="newTaskMins" placeholder="e.g. 30" type="number" min="1" />
            </div>
            <div class="field-group">
                <div class="field-label">Priority</div>
                <div class="priority-row">
                    <button class="priority-btn" id="p-highest" onclick="selectPriority('highest')">Highest</button>
                    <button class="priority-btn" id="p-high" onclick="selectPriority('high')">High</button>
                    <button class="priority-btn" id="p-medium" onclick="selectPriority('medium')">Medium</button>
                </div>
            </div>
            <button class="add-submit" onclick="submitTask()">Add Task</button>
        </div>
    </div>

    <script>
        // ─── TASKS DATA ───
        const tasks = [
            { id: 't1', name: 'Draft 2', priority: 'high', mins: 80, emoji: '🧶', done: false, desc: 'Write a second draft incorporating feedback from the initial review session.' },
            { id: 't2', name: 'Draft 6', priority: 'medium', mins: 20, emoji: '🧶', done: false, desc: 'Quick revision pass on Draft 6. Focus on clarity and structure adjustments.' },
            { id: 't3', name: 'Re-sketch', priority: 'medium', mins: 200, emoji: '🧶', done: false, desc: 'Redo the wireframe sketches with updated user flow from the latest spec changes.' },
        ];

        let selectedPriority = 'medium';

        // ─── RENDER TASKS ───
        function renderTasks() {
            const list = document.getElementById('upcomingList');
            list.innerHTML = '';
            tasks.forEach(t => {
                const card = document.createElement('div');
                card.className = 'task-card' + (t.done ? ' done-card' : '');
                card.id = t.id;
                card.innerHTML = `
        <button class="check-btn${t.done ? ' done' : ''}" onclick="toggleDone(event,'${t.id}')"></button>
        <div class="emoji">${t.emoji}</div>
        <div class="info">
          <span class="badge ${t.priority}">${t.priority}</span>
          <div class="task-name">${t.name}</div>
          <div class="task-time">⏱ ${t.mins} mins work</div>
        </div>
        <span class="arrow" onclick="openDetail(event,'${t.name}','${t.priority}',${t.mins},'${t.emoji}','${t.desc}')">›</span>
      `;
                list.appendChild(card);
            });
        }

        // ─── TOGGLE DONE ───
        function toggleDone(e, id) {
            e.stopPropagation();
            if (id === 'urgentCard') {
                const btn = document.querySelector('#urgentCard .check-btn');
                btn.classList.toggle('done');
                return;
            }
            const t = tasks.find(x => x.id === id);
            if (t) { t.done = !t.done; renderTasks(); }
        }

        // ─── DETAIL MODAL ───
        function openDetail(e, name, priority, mins, emoji, desc) {
            e.stopPropagation();
            document.getElementById('modalEmoji').textContent = emoji;
            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalTime').innerHTML = '⏱ ' + mins + ' mins estimated work';
            document.getElementById('modalDesc').textContent = desc;
            const badge = document.getElementById('modalBadge');
            badge.textContent = priority;
            badge.className = 'badge ' + priority;
            document.getElementById('detailModal').classList.add('open');
        }
        function closeDetail(e) {
            if (e.target === document.getElementById('detailModal'))
                document.getElementById('detailModal').classList.remove('open');
        }

        // ─── ADD MODAL ───
        function openAddModal() {
            document.getElementById('newTaskName').value = '';
            document.getElementById('newTaskMins').value = '';
            selectedPriority = 'medium';
            ['highest', 'high', 'medium'].forEach(p => document.getElementById('p-' + p).className = 'priority-btn');
            document.getElementById('p-medium').classList.add('sel-medium');
            document.getElementById('addModal').classList.add('open');
        }
        function closeAddModal(e) {
            if (e.target === document.getElementById('addModal'))
                document.getElementById('addModal').classList.remove('open');
        }
        function selectPriority(p) {
            selectedPriority = p;
            ['highest', 'high', 'medium'].forEach(x => {
                document.getElementById('p-' + x).className = 'priority-btn';
            });
            document.getElementById('p-' + p).classList.add('sel-' + p);
        }
        function submitTask() {
            const name = document.getElementById('newTaskName').value.trim();
            const mins = parseInt(document.getElementById('newTaskMins').value);
            if (!name || !mins) { alert('Please fill in task name and duration.'); return; }
            tasks.push({
                id: 't' + Date.now(),
                name, priority: selectedPriority, mins,
                emoji: '🧶', done: false,
                desc: 'A newly added task. Click to edit details.'
            });
            renderTasks();
            document.getElementById('addModal').classList.remove('open');
        }

        // ─── CALENDAR ───
        function buildCalendar() {
            const grid = document.getElementById('calGrid');
            const days = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];
            days.forEach((d, i) => {
                const el = document.createElement('div');
                el.className = 'cal-day-label' + (i >= 5 ? ' weekend' : '');
                el.textContent = d;
                grid.appendChild(el);
            });
            // April 2026: starts on Wednesday (index 2 in Mo-Su)
            const startOffset = 2;
            const daysInMonth = 30;
            const today = 8; // April 8 2026
            // Prev month filler
            for (let i = 0; i < startOffset; i++) {
                const el = document.createElement('div');
                el.className = 'cal-date other';
                el.textContent = 30 - startOffset + 1 + i;
                grid.appendChild(el);
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const el = document.createElement('div');
                const dow = (startOffset + d - 1) % 7; // 0=Mo … 6=Su
                let cls = 'cal-date';
                if (d === today) cls += ' today';
                else if (dow >= 5) cls += ' weekend';
                el.className = cls;
                el.textContent = d;
                grid.appendChild(el);
            }
            // Next month filler to complete rows
            const total = startOffset + daysInMonth;
            const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
            for (let i = 1; i <= remaining; i++) {
                const el = document.createElement('div');
                el.className = 'cal-date other';
                el.textContent = i;
                grid.appendChild(el);
            }
        }

        // ─── TIMER ANIMATION ───
        function animateTimer() {
            const circle = document.getElementById('timerProgress');
            const display = document.getElementById('timerDisplay');
            const circumference = 2 * Math.PI * 70; // ~440
            const totalMins = 120;
            let mins = totalMins;
            circle.style.strokeDasharray = circumference;

            function update() {
                const fraction = mins / totalMins;
                const offset = circumference * (1 - fraction);
                circle.style.strokeDashoffset = offset;
                display.textContent = mins;
                // Change colour when low
                if (mins <= 30) circle.style.stroke = '#FF6B6B';
            }
            update();
            setInterval(() => {
                if (mins > 0) { mins--; update(); }
            }, 60000); // counts down every real minute
        }

        buildCalendar();
        renderTasks();
        animateTimer();
    </script>
</body>

</html>
